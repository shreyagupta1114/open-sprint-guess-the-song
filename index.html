<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Guess the Bollywood Song</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="startPage">
    <h1>🎵 Guess the Bollywood Song 🎵</h1>
    <button id="startBtn">Start Game</button>
  </div>

  <div id="levelPage" style="display:none;">
    <h2 id="songHeading">Song 1</h2>

    <div id="emoji" style="font-size: 3rem; margin: 20px 0;">⏳ Loading...</div>
    
    <p id="hintDisplay" style="color: gray; font-style: italic; min-height: 20px;"></p>

    <div id="answerBox">
      <input type="text" id="textAnswer" placeholder="Type the song name">
      <br><br>
      
      <div id="result" style="margin-bottom: 15px; font-weight: bold;"></div>
      
      <button id="checkBtn">Submit Answer</button> <button id="micBtn">🎤 Speak Answer</button>
      <button id="hintBtn">Get a Hint</button>
      <button id="skipBtn">Skip Song</button>
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
